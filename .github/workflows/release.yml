name: Release

on:
  push:
    branches: [master]
    paths-ignore:
      - '**.md'
      - '.gitignore'

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact: macos-arm64
          - os: macos-latest
            target: x86_64-apple-darwin
            artifact: macos-x86_64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact: windows-x86_64
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact: linux-x86_64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}
      - name: Install Linux audio dev headers
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libasound2-dev
      - name: Build
        run: cargo build --release --locked --target ${{ matrix.target }}
      - name: Package
        shell: bash
        env:
          TARGET: ${{ matrix.target }}
          ARTIFACT: ${{ matrix.artifact }}
        run: |
          NAME="train-game-${ARTIFACT}"
          mkdir -p "staging/$NAME"
          if [[ "$TARGET" == *windows* ]]; then
            cp "target/$TARGET/release/train-game.exe" "staging/$NAME/"
          else
            cp "target/$TARGET/release/train-game" "staging/$NAME/"
          fi
          cp README.md "staging/$NAME/"
          (cd staging && 7z a "$NAME.zip" "$NAME" >/dev/null)
      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: staging/*.zip

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true
      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
          TAG: v0.0.${{ github.run_number }}
        run: |
          gh release create "$TAG" \
            --title "$TAG" \
            --generate-notes \
            dist/*.zip
